<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Bead Craft</title>

  <!-- iOS ICON -->
  <link rel="apple-touch-icon" href="https://i.postimg.cc/0jKxZDqz/1.png">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/0jKxZDqz/1.png">

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#faf8f5">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap');

    body {
      font-family: 'Noto Sans TC', sans-serif;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #faf8f5;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #e6dfd5;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #d4cbbd;
    }

    input::placeholder {
      color: currentColor !important;
      opacity: 0.55 !important;
    }
  </style>
</head>
<body class="bg-[#faf8f5] text-[#4a453e] min-h-screen">

  <div id="app" class="flex flex-col min-h-screen">
    <!-- 頂部溫柔導覽列 - 奶油米白風 -->
    <header class="bg-[#f5ebd9] border-b border-[#e9dcbf] text-[#5c4e37] shadow-sm sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-3 md:py-4 flex flex-col md:flex-row justify-between items-center gap-2 md:gap-4">
        <div class="flex items-center gap-3">
          <div class="bg-[#efe2c9] p-2.5 rounded-2xl">
            <i data-lucide="database" class="w-6 h-6 text-[#8b7355]"></i>
          </div>
          <div>
            <h1 class="text-xl md:text-2xl font-black tracking-wider text-[#5c4e37]">拼豆小幫手</h1>
          </div>
        </div>
        
        <!-- 頂部操作與雙模備份按鈕 -->
        <div class="flex flex-wrap justify-center gap-2">
          <button onclick="openBeadModal()" class="bg-[#bf9e74] hover:bg-[#af8d63] text-white px-3 py-1.5 rounded-xl text-sm font-medium flex items-center gap-1.5 transition shadow-sm">
            <i data-lucide="plus-circle" class="w-4 h-4"></i> 新增拼豆
          </button>
          
          <!-- 進階導出下拉選單 -->
          <div class="relative inline-block text-left" id="export-dropdown-container">
            <button onclick="toggleExportDropdown(event)" class="bg-white/70 hover:bg-white text-[#5c4e37] border border-[#e6d9bf] px-3 py-1.5 rounded-xl text-sm font-medium flex items-center gap-1.5 transition shadow-sm">
              <i data-lucide="upload" class="w-4 h-4"></i> 導出 <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
            </button>
            <div id="export-dropdown" class="hidden absolute right-0 mt-2 w-52 rounded-2xl shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-[60] focus:outline-none py-1.5 border border-[#ede3cf]">
              <button onclick="exportSystemData()" class="w-full text-left px-4 py-2.5 text-xs text-[#5c4e37] hover:bg-[#faf7f0] flex items-center gap-2 font-bold transition">
                <i data-lucide="archive" class="w-4 h-4 text-[#bf9e74]"></i> 完整備份 (.json)
              </button>
              <button onclick="exportToCSV()" class="w-full text-left px-4 py-2.5 text-xs text-[#5c4e37] hover:bg-[#faf7f0] flex items-center gap-2 transition">
                <i data-lucide="file-spreadsheet" class="w-4 h-4 text-emerald-600"></i> 庫存備份 (.csv)
              </button>
            </div>
          </div>

          <!-- 導入（同時支援舊版 CSV 與新版 JSON） -->
          <label class="bg-white/70 hover:bg-white text-[#5c4e37] border border-[#e6d9bf] px-3 py-1.5 rounded-xl text-sm font-medium flex items-center gap-1.5 transition shadow-sm cursor-pointer">
            <i data-lucide="download" class="w-4 h-4"></i> 導入
            <input type="file" id="system-file-input" accept=".json,.csv" class="hidden" onchange="importSystemData(event)">
          </label>

          <button onclick="resetToDefault()" class="bg-[#e49b8c] hover:bg-[#db8978] text-white px-3 py-1.5 rounded-xl text-sm font-medium flex items-center gap-1.5 transition shadow-sm">
            <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 歸零
          </button>
        </div>
      </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6 pb-24 lg:pb-6">
      
      <!-- 左側：圖紙消耗 & 待確認補貨區 -->
      <section class="lg:col-span-4 flex flex-col gap-6">
        
        <!-- 手機「補貨」分頁內容 -->
        <div id="mobile-tab-restock" class="hidden lg:flex flex-col gap-6">
          <!-- 儀表板看板 -->
          <div class="bg-[#fdfcf7] rounded-3xl p-5 shadow-sm border border-[#f1eada]">
            <h2 class="text-base font-bold mb-4 flex items-center gap-2 text-[#7c6a52]">
              <i data-lucide="pie-chart" class="w-4 h-4"></i> 倉庫分析
            </h2>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-[#fcf8f0] p-4 rounded-2xl border border-[#ede3cf]">
                <span class="text-xs text-[#8b7e6d] block font-medium">色號數</span>
                <span id="stat-total-colors" class="text-xl font-black text-[#5c4e37]">0</span>
              </div>
              <div class="bg-[#f4efe3] p-4 rounded-2xl border border-[#e2d5bd]">
                <span class="text-xs text-[#8b7e6d] block font-medium">總庫存</span>
                <span id="stat-total-beads" class="text-xl font-black text-[#8a7251]">0</span>
              </div>
              <div class="bg-[#faf5eb] p-4 rounded-2xl border border-[#ede3cf]">
                <span class="text-xs text-[#8b7e6d] block font-medium">登記補貨</span>
                <span id="stat-pending-types" class="text-xl font-black text-[#bca17a]">0</span>
              </div>
              <div class="bg-[#fcf3ef] p-4 rounded-2xl border border-[#f5ded6]">
                <span class="text-xs text-[#a37c74] block font-medium">無庫存</span>
                <span id="stat-out-of-stock" class="text-xl font-black text-[#d37a6a]">0</span>
              </div>
            </div>
          </div>

          <!-- 補貨待確認區（大框框設計，減少捲軸限制） -->
          <div class="bg-[#fdfcf7] rounded-3xl p-5 shadow-sm border border-[#f1eada]">
            <div class="flex justify-between items-center mb-3">
              <h2 class="text-base font-bold flex items-center gap-2 text-[#7c6a52]">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i> 補貨點收
              </h2>
              <button onclick="confirmAllRestock()" class="text-xs bg-[#cf9d67] hover:bg-[#bc8954] text-white px-2.5 py-1.5 rounded-lg transition font-medium">
                一鍵補貨
              </button>
            </div>
      
            <div class="max-h-[450px] sm:max-h-[600px] overflow-y-auto space-y-2 pr-1" id="pending-restock-list">
              <!-- 待補貨清單會動態生成於此 -->
            </div>
          </div>
        </div>

        <!-- 手機「圖紙」分頁內容 -->
        <div id="mobile-tab-patterns" class="hidden lg:flex flex-col gap-6 flex-grow">
          <!-- 圖紙配對與消耗 -->
          <div class="bg-[#fdfcf7] rounded-3xl p-5 shadow-sm border border-[#f1eada] flex-grow flex flex-col h-full">
            <div class="flex justify-between items-center mb-2">
              <h2 class="text-base font-bold flex items-center gap-2 text-[#7c6a52]">
                <i data-lucide="palette" class="w-4 h-4"></i> 拼豆圖紙
              </h2>
              <button onclick="openPatternCreator()" class="text-xs text-[#cf9d67] hover:text-[#bc8954] font-bold flex items-center gap-1">
                <i data-lucide="plus" class="w-3 h-3"></i> 新增圖紙
              </button>
            </div>
            
            <div class="mb-4 space-y-2">
              <!-- 即時搜尋框 -->
              <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-[#8b7e6d]">
                  <i data-lucide="search" class="w-3.5 h-3.5"></i>
                </span>
                <input type="text" id="pattern-search-input" oninput="populatePatternSelector()" placeholder="搜尋圖紙名稱" class="w-full bg-[#faf7f0] border border-[#ede3cf] rounded-xl pl-9 pr-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-[#cf9d67]">
              </div>

              <div>
                <label class="block text-[11px] font-bold text-[#8c816f] mb-1">選擇圖紙</label>
                <div class="flex gap-1.5">
                  <select id="pattern-selector" onchange="resetPatternSelections(); renderPatternRequirements()" class="flex-grow bg-[#faf7f0] border border-[#ede3cf] text-[#4a453e] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#cf9d67]">
                    <!-- 圖紙分類選項 -->
                  </select>
                  <button onclick="editCurrentPattern()" class="text-[#bf9e74] hover:bg-[#fcf3ef] border-[#ede3cf] p-2 rounded-xl transition" title="修改此圖紙">
                    <i data-lucide="edit-3" class="w-4 h-4"></i>
                  </button>
                  <button onclick="deleteCurrentPattern()" class="text-[#e49b8c] hover:bg-[#fcf3ef] border border-[#f5ded6] p-2 rounded-xl transition" title="刪除此圖紙">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            </div>

            <!-- 圖紙需求色號清單（寬敞無滾輪設計） -->
            <div class="bg-[#faf7f0] rounded-2xl p-4 border border-[#ede3cf] flex-grow flex flex-col min-h-[220px]">
              <div class="flex justify-between items-center mb-2 pb-2 border-b border-[#ebdcb3]/60">
                <span class="text-xs font-bold text-[#7c6a52]">所需色號與庫存</span>
              </div>
              
              <!-- 圖紙參考圖片容器 -->
              <div id="pattern-image-container" class="hidden mb-3 border border-[#ede3cf] rounded-2xl overflow-hidden bg-[#faf8f5] p-1.5 relative group shadow-inner flex justify-center items-center min-h-[140px]">
                <img id="pattern-preview-img" src="" class="w-full max-h-64 object-contain rounded-xl cursor-zoom-in hover:brightness-95 transition" onclick="zoomPatternImage()" alt="圖紙參考圖" title="點擊放大預覽">
                <div class="absolute bottom-3 right-3 flex gap-1">
                  <a id="pattern-download-btn" href="#" download="pattern.png" class="bg-[#cf9d67]/90 hover:bg-[#cf9d67] backdrop-blur-sm text-white p-2 rounded-xl shadow-md transition flex items-center justify-center" title="下載此圖片">
                    <i data-lucide="download" class="w-4 h-4"></i>
                  </a>
                </div>
              </div>

              <div id="pattern-requirements-list" class="flex-grow overflow-y-auto space-y-3 pr-1 text-sm max-h-[450px] sm:max-h-[600px]">
                <!-- 需求列表 -->
              </div>

              <div class="mt-4 pt-3 border-t border-[#ede3cf] flex gap-2">
                <button onclick="deductPatternStock()" id="btn-deduct-pattern" class="w-full bg-[#bf9e74] hover:bg-[#af8d63] text-white font-bold text-sm py-2.5 rounded-xl transition flex items-center justify-center gap-1.5 shadow-sm">
                  <i data-lucide="check" class="w-4 h-4"></i> 扣除庫存
                </button>
              </div>
            </div>
          </div>
        </div>

      </section>

      <!-- 右側拼豆庫存列表 / 手機「色號」分頁內容 -->
      <section id="mobile-tab-beads" class="hidden lg:col-span-8 lg:flex flex-col gap-4">
        
        <!-- 搜尋與篩選列 -->
        <div class="bg-[#fdfcf7] rounded-3xl p-4 shadow-sm border border-[#f1eada] flex flex-col md:flex-row gap-4 items-center justify-between">
          
          <!-- 搜尋與顯示模式 -->
          <div class="relative w-full md:w-72">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-[#8b7e6d]">
              <i data-lucide="search" class="w-4 h-4"></i>
            </span>
            <input type="text" id="search-input" oninput="filterBeads()" placeholder="搜尋色號" class="w-full bg-[#faf7f0] border border-[#ede3cf] rounded-xl pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#cf9d67]">
          </div>

          <!-- 篩選器與視圖切換 -->
          <div class="flex flex-wrap gap-2 w-full md:w-auto justify-end">
            <!-- 快速過濾 -->
            <select id="stock-filter" onchange="filterBeads()" class="bg-[#faf7f0] border border-[#ede3cf] text-[#4a453e] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#cf9d67]">
              <option value="all">所有庫存狀態</option>
              <option value="instock">有存貨</option>
              <option value="lowstock">低庫存 (小於500)</option>
              <option value="outofstock">無庫存</option>
              <option value="haspending">待確認補貨</option>
            </select>

            <!-- 檢視模式切換 -->
            <div class="bg-[#f4efe3] p-1 rounded-xl flex gap-1">
              <button onclick="setViewMode('grid')" id="btn-view-grid" class="p-1.5 rounded-lg text-[#5c4e37] bg-white shadow-sm transition">
                <i data-lucide="grid" class="w-4 h-4"></i>
              </button>
              <button onclick="setViewMode('list')" id="btn-view-list" class="p-1.5 rounded-lg text-[#5c4e37] transition">
                <i data-lucide="list" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- MARD 大分類導覽 Tabs -->
        <div class="sticky top-[118px] md:top-[74px] z-30 bg-[#faf8f5]/90 backdrop-blur-sm py-2">
          <div class="bg-[#fdfcf7] rounded-3xl px-4 py-3 shadow-sm border border-[#f1eada] overflow-x-auto whitespace-nowrap">
            <div class="flex gap-1.5" id="category-tabs">
              <!-- 分類標籤會在這裡動態渲染 -->
            </div>
          </div>
        </div>

        <!-- 批次管理工具 -->
        <div id="batch-bar" class="hidden bg-[#fbf5e7] border border-[#eddcb5] rounded-2xl px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-2">
          <div class="flex items-center gap-2">
            <span class="text-xs bg-[#cf9d67] text-white font-bold px-2 py-0.5 rounded-full" id="batch-count">0</span>
            <span class="text-xs text-[#5c4e37] font-medium">個色號已被選取</span>
          </div>
          <div class="flex gap-2">
            <button onclick="openBatchModal('consume')" class="bg-[#e49b8c] hover:bg-[#db8978] text-white text-xs px-3 py-1.5 rounded-lg transition font-medium">
              批次消耗
            </button>
            <button onclick="openBatchModal('restock')" class="bg-[#bf9e74] hover:bg-[#af8d63] text-white text-xs px-3 py-1.5 rounded-lg transition font-medium">
              批次補貨
            </button>
            <button onclick="clearBatchSelection()" class="text-slate-500 hover:text-slate-700 text-xs px-2 py-1.5 transition">
              取消選擇
            </button>
          </div>
        </div>

        <!-- 拼豆主要顯示區 -->
        <div id="beads-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 flex-grow content-start min-h-[450px]">
          <!-- 卡片/列表內容將動態渲染於此 -->
        </div>

      </section>

    </main>

    <!-- 手機底欄 Tab Bar：僅於 lg 以下螢幕顯示 -->
    <div id="mobile-tab-bar" class="fixed bottom-0 left-0 right-0 z-40 lg:hidden bg-[#fdfcf7] border-t border-[#f1eada] shadow-[0_-4px_16px_rgba(92,78,55,0.08)] rounded-t-3xl px-6 py-2.5 flex justify-around items-center">
      <!-- 左: 補貨 -->
      <button onclick="switchMobileTab('restock')" id="tab-btn-restock" class="flex flex-col items-center gap-1 px-5 py-2 rounded-2xl transition-all text-[#8c816f] bg-transparent">
        <i data-lucide="shopping-bag" class="w-5.5 h-5.5"></i>
        <span class="text-[11px] font-bold">補貨</span>
      </button>
      <!-- 中: 色號 -->
      <button onclick="switchMobileTab('beads')" id="tab-btn-beads" class="flex flex-col items-center gap-1 px-5 py-2 rounded-2xl transition-all text-[#8c816f] bg-transparent">
        <i data-lucide="grid" class="w-5.5 h-5.5"></i>
        <span class="text-[11px] font-bold">色號</span>
      </button>
      <!-- 右: 圖紙 -->
      <button onclick="switchMobileTab('patterns')" id="tab-btn-patterns" class="flex flex-col items-center gap-1 px-5 py-2 rounded-2xl transition-all text-[#8c816f] bg-transparent">
        <i data-lucide="palette" class="w-5.5 h-5.5"></i>
        <span class="text-[11px] font-bold">圖紙</span>
      </button>
    </div>

    <!-- 底部資訊 -->
    <footer class="bg-[#f1eada] text-[#8c816f] text-xs py-6 border-t border-[#e2d5bd] text-center pb-28 lg:pb-6">
      <p class="mb-1">※您的修改與圖片，儲存於本機裝置中。</p>
    </footer>

    <!-- 彈出視窗 1：批次操作 Modal -->
    <div id="batch-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] px-4 animate-in fade-in duration-200">
      <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
        <h3 id="batch-modal-title" class="text-lg font-bold mb-2 text-[#5c4e37]">批次操作</h3>
        <p id="batch-modal-desc" class="text-xs text-[#8c816f] mb-4">請輸入想要對所選色號進行的操作數量</p>
        
        <div class="mb-4">
          <label class="block text-xs font-bold text-slate-500 mb-1" id="batch-input-label">數量</label>
          <input type="number" id="batch-input-value" min="1" value="500" class="w-full bg-[#faf7f0] border border-[#ede3cf] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#cf9d67]">
        </div>

        <div class="flex justify-end gap-2">
          <button onclick="closeBatchModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-xl transition">
            取消
          </button>
          <button id="btn-batch-submit" onclick="executeBatchAction()" class="px-4 py-2 text-sm font-medium text-white bg-[#cf9d67] hover:bg-[#bc8954] rounded-xl transition">
            確定
          </button>
        </div>
      </div>
    </div>

    <!-- 彈出視窗 2：新增圖紙需求設計 Modal -->
    <div id="pattern-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] px-4 overflow-y-auto py-10 animate-in fade-in duration-200">
      <div class="bg-white rounded-3xl p-6 w-full max-w-lg shadow-2xl flex flex-col max-h-[90vh]">
        <div class="flex justify-between items-center mb-3">
          <h3 class="text-lg font-bold text-[#5c4e37] flex items-center gap-1.5">
            <i data-lucide="drafting-compass" class="w-5 h-5 text-[#cf9d67]"></i>
            圖紙需求
          </h3>
          <button onclick="closePatternCreator()" class="text-[#8c816f] hover:text-black">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        
        <!-- 圖片上傳 & 分類資訊行 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
          <!-- 圖紙名稱 -->
          <div>
            <label class="block text-xs font-bold text-[#5c4e37] mb-1">圖紙名稱</label>
            <input type="text" id="new-pattern-name" placeholder="輸入名稱" class="w-full bg-[#faf7f0] border border-[#ede3cf] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#cf9d67]">
          </div>
          <!-- 新增分類欄位 -->
          <div>
            <label class="block text-xs font-bold text-[#5c4e37] mb-1">圖紙分類</label>
            <div class="flex flex-col gap-1.5">
              <select id="new-pattern-category-select" onchange="togglePatternCustomCategoryField()" class="w-full bg-[#faf7f0] border border-[#ede3cf] text-[#4a453e] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#cf9d67]">
                <!-- 由 JavaScript 動態生成目前已有使用的自訂類別 -->
              </select>
              <input type="text" id="new-pattern-category-custom" placeholder="請輸入自訂分類名稱" class="hidden w-full bg-[#faf7f0] border border-[#ede3cf] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#cf9d67] uppercase">
            </div>
          </div>
        </div>

        <!-- 圖片上傳區塊（內含縮圖自動壓縮引擎） -->
        <div class="mb-4">
          <label class="block text-xs font-bold text-[#5c4e37] mb-1">上傳圖片</label>
          <div class="flex items-center gap-3 bg-[#faf7f0] p-3 rounded-2xl border border-[#ede3cf]">
            <label class="bg-white hover:bg-[#faf7f0] text-[#5c4e37] border border-[#e6d9bf] px-3.5 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 transition shadow-sm cursor-pointer whitespace-nowrap">

    // 取得色號分類
    function getBeadCategory(code) {
      if (code.startsWith('ZG')) return 'ZG';
      return code.charAt(0).toUpperCase();
    }

    // 取得預設名稱
    function getDefaultName(code, customRemark = '') {
      if (customRemark.trim()) return customRemark.trim();
      if (code === 'H1') return '透明';
      if (code === 'H2') return '白色';
      if (code === 'H7') return '黑色';

      const category = getBeadCategory(code);
      if (category === 'Y') return 'Mard夜光';
      if (category === 'ZG') return 'Mard夜光';
      if (category === 'P') return 'Mard珠光';
      if (category === 'R') return 'Mard果凍';
      if (category === 'Q') return 'Mard溫變';
      return 'Mard';
    }

    // 拼豆數據庫初始化
    function populateEmptyBeads() {
      const sortedCodes = Object.keys(colorMap).sort((a, b) => {
        const isAZG = a.startsWith('ZG');
        const isBZG = b.startsWith('ZG');
        if (isAZG && !isBZG) return 1;
        if (!isAZG && isBZG) return -1;
        return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
      });

      return sortedCodes.map(code => {
        return {
          code: code,
          name: getDefaultName(code),
          stock: 0,
          pending: 0,
          color: colorMap[code] || '#ffffff',
          category: getBeadCategory(code)
        };
      });
    }

    let activeMobileTab = 'beads'; 
    let draftPatternImage = ''; 

    // 相容輔助函式
    function getPatternRequirements(name) {
      const pat = patterns[name];
      if (!pat) return [];
      return Array.isArray(pat) ? pat : (pat.requirements || []);
    }

    function getPatternImage(name) {
      const pat = patterns[name];
      if (!pat || Array.isArray(pat)) return '';
      return pat.image || '';
    }

    // --- STREAMING_CHUNK: Setting up storage handlers and life cycles... ---
    // 啟動與自動加載
    window.onload = function() {
      lucide.createIcons();
      
      const savedBeads = localStorage.getItem('mard_beads_data');
      const savedPatterns = localStorage.getItem('mard_patterns_data');
      
      // 1. 先完整讀取並初始化拼豆色號資料（此時不執行 saveData 避免空資料覆寫圖紙）
      if (savedBeads) {
        beads = JSON.parse(savedBeads);
        beads = beads.filter(b => b.code !== 'T1');
        fillMissingMARDCodes();
      } else {
        beads = populateEmptyBeads();
      }

      beads.forEach(b => {
        if (!b.category) {
          b.category = getBeadCategory(b.code);
        }
        if (!b.name || b.name === b.code || b.name === 'Mard') {
          b.name = getDefaultName(b.code);
        }
      });

      // 2. 緊接著完整讀取並初始化圖紙配方資料
      if (savedPatterns) {
        patterns = JSON.parse(savedPatterns);
        // 相容與升級舊格式
        Object.keys(patterns).forEach(name => {
          if (Array.isArray(patterns[name])) {
            patterns[name] = {
              requirements: patterns[name],
              image: '',
              category: '未分類'
            };
          } else if (!patterns[name].category) {
            patterns[name].category = '未分類';
          }
        });
      } else {
        patterns = {};
        Object.keys(initialPatternsData).forEach(name => {
          patterns[name] = {
            requirements: initialPatternsData[name].requirements,
            image: '',
            category: initialPatternsData[name].category || '未分類'
          };
        });
      }

      // 3. 確保拼豆色號與圖紙配方「兩者皆已成功加載至記憶體」後，才進行安全性的第一次同步寫入
      saveData();

      renderCategoryTabs();
      renderBeads();
      renderStats();
      renderPendingList();
      populatePatternSelector();
      updatePatternCategorySelect();
      resetPatternSelections();
      renderPatternRequirements();
      setupDatalistOptions();

      switchMobileTab('beads');
    };

    function fillMissingMARDCodes() {
      const existingCodes = new Set(beads.map(b => b.code));
      Object.keys(colorMap).forEach(code => {
        if (!existingCodes.has(code)) {
          beads.push({
            code: code,
            name: getDefaultName(code),
            stock: 0,
            pending: 0,
            color: colorMap[code],
            category: getBeadCategory(code)
          });
        }
      });
      beads.sort((a, b) => {
        const isAZG = a.code.startsWith('ZG');
        const isBZG = b.code.startsWith('ZG');
        if (isAZG && !isBZG) return 1;
        if (!isAZG && isBZG) return -1;
        return a.code.localeCompare(b.code, undefined, { numeric: true, sensitivity: 'base' });
      });
      // 移除此處提早呼叫的 saveData() 避免覆寫未載入完成之圖紙
    }

    // 統一本機儲存（加入防容量爆滿機制）
    function saveData() {
      try {
        localStorage.setItem('mard_beads_data', JSON.stringify(beads));
        localStorage.setItem('mard_patterns_data', JSON.stringify(patterns));
      } catch (e) {
        console.error("LocalStorage write failed:", e);
        showToast("⚠️ 儲存失敗！本機瀏覽器容量已滿，請點選導出進行「完整備份」並適當清空圖紙！", "alert");
      }
    }

    // --- STREAMING_CHUNK: Handlers for mobile transitions and navigation... ---
    function switchMobileTab(tab) {
      activeMobileTab = tab;

      const restockEl = document.getElementById('mobile-tab-restock');
      const beadsEl = document.getElementById('mobile-tab-beads');
      const patternsEl = document.getElementById('mobile-tab-patterns');

      const btnRestock = document.getElementById('tab-btn-restock');
      const btnBeads = document.getElementById('tab-btn-beads');
      const btnPatterns = document.getElementById('tab-btn-patterns');

      restockEl.classList.add('hidden');
      restockEl.classList.remove('flex');
      beadsEl.classList.add('hidden');
      beadsEl.classList.remove('flex');
      patternsEl.classList.add('hidden');
      patternsEl.classList.remove('flex');

      if (tab === 'restock') {
        restockEl.classList.remove('hidden');
        restockEl.classList.add('flex');
      } else if (tab === 'beads') {
        beadsEl.classList.remove('hidden');
        beadsEl.classList.add('flex');
      } else if (tab === 'patterns') {
        patternsEl.classList.remove('hidden');
        patternsEl.classList.add('flex');
      }

      const inactiveClass = "text-[#8c816f] bg-transparent";
      const activeClass = "text-[#5c4e37] bg-[#efe2c9]/65 shadow-md shadow-[#5c4e37]/5 scale-105 font-bold";

      btnRestock.className = `flex flex-col items-center gap-1 px-5 py-2 rounded-2xl transition-all ${tab === 'restock' ? activeClass : inactiveClass}`;
      btnBeads.className = `flex flex-col items-center gap-1 px-5 py-2 rounded-2xl transition-all ${tab === 'beads' ? activeClass : inactiveClass}`;
      btnPatterns.className = `flex flex-col items-center gap-1 px-5 py-2 rounded-2xl transition-all ${tab === 'patterns' ? activeClass : inactiveClass}`;

      lucide.createIcons();
    }

    function selectCategory(cat) {
      selectedCategory = cat;
      renderCategoryTabs();
      renderBeads();
    }

    function renderStats() {
      document.getElementById('stat-total-colors').innerText = beads.length;
      
      const totalBeads = beads.reduce((acc, curr) => acc + (curr.stock || 0), 0);
      document.getElementById('stat-total-beads').innerText = totalBeads.toLocaleString();

      const pendingTypes = beads.filter(b => b.pending > 0).length;
      document.getElementById('stat-pending-types').innerText = pendingTypes;

      const outOfStock = beads.filter(b => b.stock === 0).length;
      document.getElementById('stat-out-of-stock').innerText = outOfStock;
    }

    function showCustomConfirm(title, desc, onConfirm) {
      document.getElementById('confirm-modal-title').innerText = title;
      document.getElementById('confirm-modal-desc').innerText = desc;
      onConfirmCallback = onConfirm;
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    function closeCustomConfirm() {
      document.getElementById('confirm-modal').classList.add('hidden');
      onConfirmCallback = null;
    }

    function executeCustomConfirm() {
      if (onConfirmCallback) onConfirmCallback();
      closeCustomConfirm();
    }

    function renderCategoryTabs() {
      const uniqueCats = Array.from(new Set(beads.map(b => b.category || getBeadCategory(b.code))));
      uniqueCats.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

      const categories = ['ALL', ...uniqueCats];
      const tabsContainer = document.getElementById('category-tabs');
      tabsContainer.innerHTML = '';

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.onclick = () => selectCategory(cat);
        btn.className = `px-3.5 py-1.5 text-xs font-bold rounded-xl transition-all ${
          selectedCategory === cat 
            ? 'bg-[#cf9d67] text-white shadow-md shadow-[#cf9d67]/10' 
            : 'bg-[#faf7f0] hover:bg-[#ede3cf]/60 text-[#7c6a52] border border-[#ede3cf]/60'
        }`;
        btn.innerText = cat === 'ALL' ? 'ALL' : cat;
        tabsContainer.appendChild(btn);
      });
    }

    function getContrastColor(bead) {
      if (bead.textColor === '#8D877F' || bead.textColor === '#ffffff') {
        return bead.textColor;
      }
      if (lightCodes.has(bead.code)) {
        return '#8D877F';
      }
      return '#ffffff';
    }

    // --- STREAMING_CHUNK: Main rendering engine for catalog cards... ---
    function renderBeads() {
      const container = document.getElementById('beads-container');
      container.innerHTML = '';

      const searchVal = document.getElementById('search-input').value.toLowerCase().trim();
      const stockFilter = document.getElementById('stock-filter').value;

      let filtered = beads.filter(bead => {
        if (selectedCategory !== 'ALL') {
          if (bead.category !== selectedCategory) return false;
        }

        if (searchVal) {
          const matchCode = bead.code.toLowerCase().includes(searchVal);
          const matchName = bead.name.toLowerCase().includes(searchVal);
          if (!matchCode && !matchName) return false;
        }

        if (stockFilter === 'instock' && bead.stock <= 0) return false;
        if (stockFilter === 'lowstock' && (bead.stock <= 0 || bead.stock >= 500)) return false;
        if (stockFilter === 'outofstock' && bead.stock > 0) return false;
        if (stockFilter === 'haspending' && bead.pending <= 0) return false;

        return true;
      });

      if (viewMode === 'grid') {
        container.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 flex-grow content-start";
      } else {
        container.className = "flex flex-col gap-2.5 flex-grow content-start";
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="col-span-full py-12 flex flex-col items-center justify-center text-slate-400 gap-2 bg-white rounded-3xl border border-[#ede3cf]/40">
            <i data-lucide="inbox" class="w-12 h-12 stroke-1 text-[#8c816f]"></i>
            <span class="text-sm text-[#8c816f]/80">未找到符合篩選的拼豆色號</span>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      filtered.forEach(bead => {
        const isSelected = selectedBeads.has(bead.code);
        const textColor = getContrastColor(bead);
        const cardStyle = `background-color: ${bead.color}; color: ${textColor}; border-color: ${textColor}22;`;

        if (viewMode === 'grid') {
          const card = document.createElement('div');
          card.className = `relative rounded-3xl p-4 shadow-sm transition-all duration-200 border-2 ${
            isSelected ? 'border-[#cf9d67] ring-4 ring-[#cf9d67]/10 scale-[1.01]' : 'hover:shadow-md'
          } flex flex-col justify-between min-h-[225px] h-auto cursor-pointer group`;
          card.style = cardStyle;
          
          card.onclick = () => {
            toggleBeadSelection(bead.code);
          };

          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div class="flex flex-col">
                <span class="text-lg font-black tracking-wide">${bead.code}</span>
                <span class="text-[10px] opacity-75 truncate max-w-[120px]">${bead.name}</span>
              </div>
              <div class="flex gap-1 items-center">
                <button onclick="event.stopPropagation(); openBeadModal('${bead.code}')" class="p-1 rounded-lg bg-white/20 hover:bg-white/40 transition opacity-0 group-hover:opacity-100" title="修改或刪除色號">
                  <i data-lucide="edit-3" class="w-3.5 h-3.5" style="color: ${textColor}"></i>
                </button>
                <div class="w-5 h-5 rounded-md border flex items-center justify-center ${isSelected ? 'bg-[#cf9d67] border-[#cf9d67]' : 'border-current/40 bg-white/10'}" onclick="event.stopPropagation(); toggleBeadSelection('${bead.code}')">
                  ${isSelected ? '<i data-lucide="check" class="w-3 h-3 text-white"></i>' : ''}
                </div>
              </div>
            </div>

            <div class="my-2.5 flex flex-wrap items-baseline gap-x-1.5 gap-y-1">
              <span class="text-2xl font-black">${bead.stock}</span>
              <span class="text-[10px] opacity-80 mr-1">顆</span>
              ${bead.pending > 0 ? `
                <span class="bg-[#cf9d67] text-white text-[9px] font-bold px-1.5 py-0.5 rounded-md animate-pulse whitespace-nowrap">
                  待補: +${bead.pending}
                </span>
              ` : ''}
            </div>

            <div class="space-y-1.5 mt-auto" onclick="event.stopPropagation();">
              <!-- 消耗快速調整按鈕 - 按一次快速消耗 500 -->
              <div class="flex items-center gap-1 bg-white/20 p-1 rounded-xl border" style="border-color: ${textColor}33;">
                <button onclick="adjustStock('${bead.code}', -500)" class="w-6 h-6 rounded-lg bg-white/15 hover:bg-white/30 text-[9px] flex items-center justify-center font-bold" title="快速消耗 500 顆">-500</button>
                <input type="number" id="consume-val-${bead.code}" placeholder="消耗" class="w-full bg-transparent text-center text-xs focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none font-bold placeholder-white/50" style="color: ${textColor};" onkeydown="handleQuickAction(event, '${bead.code}', 'consume')">
                <button onclick="submitConsume('${bead.code}')" class="text-[10px] bg-white text-[#4a453e] font-bold px-1.5 py-1 rounded-lg hover:bg-slate-100 transition shadow-sm">消耗</button>
              </div>

              <!-- 補貨快速調整按鈕 - 按一次快速增加 1000 顆 -->
              <div class="flex items-center gap-1 bg-black/10 p-1 rounded-xl border" style="border-color: ${textColor}15;">
                <button onclick="adjustStock('${bead.code}', 1000)" class="w-6 h-6 rounded-lg bg-white/15 hover:bg-white/30 text-[9px] flex items-center justify-center font-bold text-white" title="快速登記補貨 1000 顆">+1k</button>
                <input type="number" id="restock-val-${bead.code}" placeholder="補貨" class="w-full bg-transparent text-center text-xs focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none font-bold placeholder-white/50" style="color: ${textColor};" onkeydown="handleQuickAction(event, '${bead.code}', 'restock')">
                <button onclick="submitRestock('${bead.code}')" class="text-[10px] bg-white text-[#4a453e] font-bold px-1.5 py-1 rounded-lg hover:bg-slate-100 transition shadow-sm">補貨</button>
              </div>
            </div>
          `;
          container.appendChild(card);
        } else {
          const row = document.createElement('div');
          row.className = `flex flex-row justify-between items-center p-2 sm:p-3 rounded-2xl border transition-all group ${
            isSelected ? 'border-[#cf9d67] bg-[#fdfaf2]' : 'border-[#ede3cf]/40 bg-white hover:bg-[#faf7f0]'
          } gap-2 sm:gap-4 cursor-pointer w-full min-w-0`;
          row.onclick = () => toggleBeadSelection(bead.code);

          row.innerHTML = `
            <div class="flex items-center gap-2 sm:gap-3 shrink-0">
              <div class="w-4 h-4 sm:w-5 sm:h-5 rounded-md border flex items-center justify-center ${isSelected ? 'bg-[#cf9d67] border-[#cf9d67]' : 'bg-white border-slate-300'}" onclick="event.stopPropagation(); toggleBeadSelection('${bead.code}')">
                ${isSelected ? '<i data-lucide="check" class="w-2.5 h-2.5 sm:w-3 sm:h-3 text-white"></i>' : ''}
              </div>
              <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full shadow-inner border border-[#ede3cf]/60 relative overflow-hidden flex items-center justify-center shrink-0" style="background-color: ${bead.color}">
                 <button onclick="event.stopPropagation(); openBeadModal('${bead.code}')" class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition" title="修改或刪除">
                    <i data-lucide="edit-3" class="w-3.5 h-3.5 text-white"></i>
                 </button>
              </div>
              <div class="min-w-[42px] sm:min-w-[70px]">
                <span class="font-black text-[#5c4e37] text-xs sm:text-sm block leading-tight">${bead.code}</span>
                <span class="text-[9px] sm:text-xs text-[#8c816f] block truncate max-w-[45px] sm:max-w-[100px]">${bead.name}</span>
              </div>
            </div>

            <div class="flex items-center gap-2 sm:gap-4 px-1 shrink-0" onclick="event.stopPropagation();">
              <div>
                <span class="text-[8px] sm:text-[10px] text-slate-400 block text-center sm:text-left font-bold">庫存</span>
                <div class="flex items-center gap-1">
                  <button onclick="adjustStock('${bead.code}', -100)" class="w-4 h-4 sm:w-5 sm:h-5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] sm:text-xs rounded flex items-center justify-center font-bold">-</button>
                  <span class="font-bold text-slate-800 text-xs sm:text-sm min-w-[28px] sm:min-w-[45px] text-center">${bead.stock}</span>
                  <button onclick="adjustStock('${bead.code}', 100)" class="w-4 h-4 sm:w-5 sm:h-5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] sm:text-xs rounded flex items-center justify-center font-bold">+</button>
                </div>
              </div>

              ${bead.pending > 0 ? `
                <div class="bg-amber-50 border border-amber-200 rounded-lg px-1 sm:px-2 py-0.5 flex items-center gap-1 shrink-0">
                  <div>
                    <span class="text-[8px] sm:text-[9px] text-amber-500 block font-bold leading-none">待補</span>
                    <span class="text-[10px] sm:text-xs font-black text-amber-700 leading-tight">+${bead.pending}</span>
                  </div>
                  <button onclick="confirmSingleRestock('${bead.code}')" class="bg-[#cf9d67] hover:bg-[#bc8954] text-white text-[8px] sm:text-[10px] px-1 py-0.5 rounded transition font-medium">點收</button>
                </div>
              ` : ''}
            </div>

            <div class="flex items-center gap-1.5 sm:gap-2 ml-auto shrink-0 flex-nowrap" onclick="event.stopPropagation();">
              <div class="flex items-center border border-slate-200 rounded-xl bg-slate-50 p-0.5 sm:p-1 w-[80px] sm:w-28 shrink-0">
                <input type="number" id="consume-val-list-${bead.code}" placeholder="數量" class="w-full bg-transparent text-center text-[10px] sm:text-xs focus:outline-none font-bold [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none min-w-0">
                <button onclick="submitConsume('${bead.code}', true)" class="text-[10px] bg-white text-[#4a453e] border border-slate-200/65 font-bold px-1.5 sm:px-2 py-0.5 sm:py-1 rounded-lg hover:bg-slate-100 transition shadow-sm shrink-0">消耗</button>
              </div>

              <div class="flex items-center border border-slate-200 rounded-xl bg-slate-50 p-0.5 sm:p-1 w-[80px] sm:w-28 shrink-0">
                <input type="number" id="restock-val-list-${bead.code}" placeholder="數量" class="w-full bg-transparent text-center text-[10px] sm:text-xs focus:outline-none font-bold [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none min-w-0">
                <button onclick="submitRestock('${bead.code}', true)" class="text-[10px] bg-white text-[#4a453e] border border-slate-200/65 font-bold px-1.5 sm:px-2 py-0.5 sm:py-1 rounded-lg hover:bg-slate-100 transition shadow-sm shrink-0">補貨</button>
              </div>
            </div>
          `;
          container.appendChild(row);
        }
      });

      lucide.createIcons();
    }

    // --- STREAMING_CHUNK: Handlers for batch modifications and single updates... ---
    function toggleBeadSelection(code) {
      if (selectedBeads.has(code)) {
        selectedBeads.delete(code);
      } else {
        selectedBeads.add(code);
      }
      renderBatchBar();
      renderBeads();
    }

    function clearBatchSelection() {
      selectedBeads.clear();
      renderBatchBar();
      renderBeads();
    }

    function renderBatchBar() {
      const bar = document.getElementById('batch-bar');
      const countSpan = document.getElementById('batch-count');
      if (selectedBeads.size > 0) {
        bar.classList.remove('hidden');
        countSpan.innerText = selectedBeads.size;
      } else {
        bar.classList.add('hidden');
      }
    }

    function filterBeads() {
      renderBeads();
    }

    function setViewMode(mode) {
      viewMode = mode;
      document.getElementById('btn-view-grid').className = mode === 'grid' ? 'p-1.5 rounded-lg text-[#5c4e37] bg-white shadow-sm transition' : 'p-1.5 rounded-lg text-[#5c4e37] transition';
      document.getElementById('btn-view-list').className = mode === 'list' ? 'p-1.5 rounded-lg text-[#5c4e37] bg-white shadow-sm transition' : 'p-1.5 rounded-lg text-[#5c4e37] transition';
      renderBeads();
    }

    function handleQuickAction(e, code, type) {
      if (e.key === 'Enter') {
        if (type === 'consume') {
          submitConsume(code);
        } else if (type === 'restock') {
          submitRestock(code);
        }
      }
    }

    // 調整庫存
    function adjustStock(code, amount) {
      const b = beads.find(x => x.code === code);
      if (b) {
        if (amount < 0) {
          const actualDeduct = Math.abs(amount);
          if (b.stock < actualDeduct) {
            showToast(`${code} 庫存僅剩 ${b.stock}，不足扣除 ${actualDeduct}！`, 'alert');
            return;
          }
          b.stock -= actualDeduct;
          showToast(`${code} 已快速消耗 ${actualDeduct} 顆`);
        } else {
          b.stock += amount;
          showToast(`${code} 庫存已增加 ${amount} 顆`);
        }
        saveData();
        renderBeads();
        renderStats();
        renderPatternRequirements();
      }
    }

    function submitConsume(code, isList = false) {
      const inputId = isList ? `consume-val-list-${code}` : `consume-val-${code}`;
      const input = document.getElementById(inputId);
      const val = parseInt(input.value);
      if (isNaN(val) || val <= 0) {
        showToast('請輸入正確的消耗數量', 'alert');
        return;
      }

      const b = beads.find(x => x.code === code);
      if (b) {
        if (b.stock < val) {
          showToast(`庫存不足！現有 ${b.stock}，欲消耗 ${val}`, 'alert');
          return;
        }
        b.stock -= val;
        input.value = '';
        saveData();
        renderBeads();
        renderStats();
        renderPatternRequirements();
        showToast(`${code} 成功消耗 ${val} 顆`);
      }
    }

    function submitRestock(code, isList = false) {
      const inputId = isList ? `restock-val-list-${code}` : `restock-val-${code}`;
      const input = document.getElementById(inputId);
      const val = parseInt(input.value);
      if (isNaN(val) || val <= 0) {
        showToast('請輸入正確的補貨數量', 'alert');
        return;
      }

      const b = beads.find(x => x.code === code);
      if (b) {
        b.pending += val; 
        input.value = '';
        saveData();
        renderBeads();
        renderStats();
        renderPendingList();
        showToast(`${code} 已登記補貨 ${val} 顆 (待點收確認)`);
      }
    }

    function confirmSingleRestock(code) {
      const b = beads.find(x => x.code === code);
      if (b && b.pending > 0) {
        b.stock += b.pending;
        const added = b.pending;
        b.pending = 0; 
        saveData();
        renderBeads();
        renderStats();
        renderPendingList();
        renderPatternRequirements();

    // --- STREAMING_CHUNK: Filtering, sorting and rendering patterns... ---
    function populatePatternSelector() {
      const selector = document.getElementById('pattern-selector');
      const searchVal = document.getElementById('pattern-search-input').value.toLowerCase().trim();
      
      const currentSelected = selector.value;
      selector.innerHTML = '';
      
      const grouped = {};
      
      Object.keys(patterns).forEach(name => {
        if (searchVal && !name.toLowerCase().includes(searchVal)) {
          return;
        }
        
        const pattern = patterns[name];
        const category = (pattern && pattern.category) ? pattern.category.trim() : '未分類';
        
        if (!grouped[category]) {
          grouped[category] = [];
        }
        grouped[category].push(name);
      });
      
      const sortedCategories = Object.keys(grouped).sort((a, b) => {
        if (a === '未分類') return 1;
        if (b === '未分類') return -1;
        return a.localeCompare(b, 'zh-Hant-TW');
      });
      
      let hasAnyOption = false;
      
      sortedCategories.forEach(cat => {
        const optgroup = document.createElement('optgroup');
        optgroup.label = cat;
        
        const sortedNames = grouped[cat].sort((a, b) => a.localeCompare(b, 'zh-Hant-TW', {numeric: true}));
        
        sortedNames.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.innerText = name;
          optgroup.appendChild(opt);
          hasAnyOption = true;
        });
        
        selector.appendChild(optgroup);
      });
      
      if (!hasAnyOption) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.innerText = searchVal ? '🔍 無符合搜尋的圖紙' : '📅 尚未建立圖紙';
        selector.appendChild(opt);
      } else {
        if (currentSelected && patterns[currentSelected] && (!searchVal || currentSelected.toLowerCase().includes(searchVal))) {
          selector.value = currentSelected;
        }
      }
    }

    function togglePatternCustomCategoryField() {
      const select = document.getElementById('new-pattern-category-select');
      const customInput = document.getElementById('new-pattern-category-custom');

    function updatePatternCategorySelect() {
      const select = document.getElementById('new-pattern-category-select');
      if (!select) return;

      const currentVal = select.value;
      select.innerHTML = '';

      const optDefault = document.createElement('option');
      optDefault.value = '未分類';
      optDefault.innerText = '未分類';
      select.appendChild(optDefault);

      const categories = new Set();
      Object.keys(patterns).forEach(name => {
        const pattern = patterns[name];
        if (pattern && pattern.category) {
          const cat = pattern.category.trim();
          if (cat && cat !== '未分類') {
            categories.add(cat);
          }
        }
      });

      const sortedCats = Array.from(categories).sort((a, b) => a.localeCompare(b, 'zh-Hant-TW'));
      sortedCats.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.innerText = cat;
        select.appendChild(opt);
      });

      const optCustom = document.createElement('option');
      optCustom.value = '__custom__';
      optCustom.innerText = '＋自訂新分類';
      select.appendChild(optCustom);
    }

    function resetPatternSelections() {
      activePatternSelections = {};
      const selector = document.getElementById('pattern-selector');
      const patternName = selector.value;
      if (patternName && patterns[patternName]) {
        const requirements = getPatternRequirements(patternName);
        requirements.forEach(req => {
          activePatternSelections[req.code] = req.code; 
        });
      }
    }

    function selectActiveCode(mainCode, chosenCode) {
      activePatternSelections[mainCode] = chosenCode;
      renderPatternRequirements();
    }

    function renderPatternRequirements() {
      const selector = document.getElementById('pattern-selector');
      const list = document.getElementById('pattern-requirements-list');
      const btn = document.getElementById('btn-deduct-pattern');
      
      list.innerHTML = '';
      
      const patternName = selector.value;

      const imgContainer = document.getElementById('pattern-image-container');
      const previewImg = document.getElementById('pattern-preview-img');
      const downloadBtn = document.getElementById('pattern-download-btn');
      const imgData = getPatternImage(patternName);

      if (imgData) {
        imgContainer.classList.remove('hidden');
        previewImg.src = imgData;
        downloadBtn.href = imgData;
        downloadBtn.setAttribute('download', `${patternName}_參考圖.png`);
      } else {
        imgContainer.classList.add('hidden');
      }

      if (!patternName || !patterns[patternName]) {
        list.innerHTML = `<div class="text-center py-6 text-xs text-[#8c816f]/60">目前無相符的圖紙配方</div>`;
        btn.disabled = true;
        btn.className = "w-full bg-slate-200 text-slate-400 font-medium text-sm py-2.5 rounded-xl cursor-not-allowed flex items-center justify-center gap-1";
        return;
      }

      const requirements = getPatternRequirements(patternName);
      let canCraft = true;

      requirements.forEach(req => {
        const allOptions = [req.code, ...(req.altCodes || [])];
        
        if (!activePatternSelections[req.code]) {
          activePatternSelections[req.code] = req.code;
        }
        
        const currentlyChosen = activePatternSelections[req.code];
        const chosenBead = beads.find(b => b.code === currentlyChosen);
        const chosenStock = chosenBead ? chosenBead.stock : 0;
        const isSufficient = chosenStock >= req.req;
        
        if (!isSufficient) {
          canCraft = false;
        }

        const item = document.createElement('div');
        item.className = `flex flex-col p-3 rounded-2xl text-xs gap-2 ${
          isSufficient ? 'bg-[#f4fcf6] border border-green-100' : 'bg-[#fff5f2] border border-rose-100 text-[#a35144]'
        }`;

        let toggleButtonsHTML = '';
        allOptions.forEach(optCode => {
          const optBead = beads.find(b => b.code === optCode);
          const optStock = optBead ? optBead.stock : 0;
          const isActive = currentlyChosen === optCode;
          
          toggleButtonsHTML += `
            <button onclick="selectActiveCode('${req.code}', '${optCode}')" 
              class="px-2 py-1 rounded-lg border text-[10px] font-bold transition-all flex items-center gap-1 ${
                isActive 
                  ? 'bg-[#cf9d67] border-[#cf9d67] text-white shadow-sm' 
                  : 'bg-white border-[#ede3cf] text-[#7c6a52] hover:bg-[#faf7f0]'
              }">
              <span class="w-1.5 h-1.5 rounded-full" style="background-color: ${optBead ? optBead.color : '#ccc'}"></span>
              ${optCode} (${optStock}顆)
            </button>
          `;
        });

        item.innerHTML = `
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-1.5">
              <span class="w-3 h-3 rounded-full border border-slate-200" style="background-color: ${chosenBead ? chosenBead.color : '#cccccc'}"></span>
              <span class="font-bold text-[#4a453e]"> ${req.code}</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-[#8c816f]">需 <b class="text-[#4a453e]">${req.req}</b> 顆</span>
              <span class="flex items-center gap-1">
                ${isSufficient ? '<span class="text-green-600 font-bold">充足</span><i data-lucide="check-circle" class="w-3.5 h-3.5 text-green-500"></i>' : '<span class="text-rose-600 font-bold">缺貨</span><i data-lucide="alert-triangle" class="w-3.5 h-3.5 text-rose-500"></i>'}
              </span>
            </div>
          </div>
          <div class="flex flex-wrap gap-1.5 pt-1 border-t border-[#ede3cf]/40">
            ${toggleButtonsHTML}
          </div>
        `;
        list.appendChild(item);
      });

      if (canCraft) {
        btn.disabled = false;
        btn.className = "w-full bg-[#bf9e74] hover:bg-[#af8d63] text-white font-bold text-sm py-2.5 rounded-xl transition flex items-center justify-center gap-1.5 shadow-sm";
      } else {
        btn.disabled = true;
        btn.className = "w-full bg-[#ede6d9] text-[#bcaaa4] font-semibold text-sm py-2.5 rounded-xl cursor-not-allowed flex items-center justify-center gap-1";
      }

      lucide.createIcons();
    }

    function deductPatternStock() {
      const selector = document.getElementById('pattern-selector');
      const patternName = selector.value;
      if (!patternName || !patterns[patternName]) return;

      const requirements = getPatternRequirements(patternName);
      let canCraft = true;
      requirements.forEach(req => {
        const currentlyChosen = activePatternSelections[req.code] || req.code;
        const bead = beads.find(b => b.code === currentlyChosen);
        const currentStock = bead ? bead.stock : 0;

        if (currentStock < req.req) {
          canCraft = false;
        }
      });

      if (!canCraft) {
        showToast('選定的色號庫存不足，無法製作！', 'alert');
        return;
      }

      requirements.forEach(req => {
        const currentlyChosen = activePatternSelections[req.code] || req.code;
        const bead = beads.find(b => b.code === currentlyChosen);
        if (bead) {
          bead.stock -= req.req;
        }
      });

      saveData();
      renderBeads();
      renderStats();
      renderPatternRequirements();
      showToast(`成功製作圖紙「${patternName}」，已扣除選定色號的庫存！`);
    }

    function deleteCurrentPattern() {
      const selector = document.getElementById('pattern-selector');
      const name = selector.value;
      if (!name) return;

      showCustomConfirm(
        '刪除圖紙確認',
        `確定要刪除「${name}」圖紙嗎？這個動作將無法復原。`,
        () => {
          delete patterns[name];
          saveData();
          populatePatternSelector();
          updatePatternCategorySelect();
          resetPatternSelections();
          renderPatternRequirements();
          showToast(`已成功移除圖紙 ${name}`);
        }
      );
    }

    function addBeadToDraftPattern() {
      const searchInput = document.getElementById('pattern-item-search');
      const altInput = document.getElementById('pattern-item-alt');
      const qtyInput = document.getElementById('pattern-item-qty');
      
      const code = searchInput.value.trim().toUpperCase();
      const rawAlts = altInput.value.trim();
      const qty = parseInt(qtyInput.value);

      if (!code) {
        showToast('請輸入拼豆主色號', 'alert');
        return;
      }

      const exist = beads.some(b => b.code === code);
      if (!exist) {
        showToast(`注意：色號表無主色號「${code}」，已為您強制加入需求！`, 'info');
      }

      let altCodes = [];
      if (rawAlts) {
        altCodes = rawAlts.split(',')
                          .map(s => s.trim().toUpperCase())
                          .filter(s => s !== '');
        
        for (let alt of altCodes) {
          const altExist = beads.some(b => b.code === alt);
          if (!altExist) {
            showToast(`注意：色號表無替代色號「${alt}」，已為您強制加入需求！`, 'info');
          }
          if (code === alt) {
            showToast('替代色號不能與主色號相同', 'alert');
            return;
          }
        }
      }

      if (isNaN(qty) || qty <= 0) {
        showToast('請輸入正確的需求數量', 'alert');
        return;
      }

      const existDraftItem = draftPatternBeads.find(item => item.code === code);
      if (existDraftItem) {
        existDraftItem.req += qty;
        if (altCodes.length > 0) {
          existDraftItem.altCodes = Array.from(new Set([...(existDraftItem.altCodes || []), ...altCodes]));
        }
      } else {
        draftPatternBeads.push({ 
          code, 
          req: qty, 
          altCodes: altCodes.length > 0 ? altCodes : undefined 
        });
      }

      searchInput.value = '';
      altInput.value = '';
      qtyInput.value = '';
      
      renderPatternDraftList();
      showToast(`已加入草稿: ${code} ${altCodes.length > 0 ? `(可代: ${altCodes.join(', ')})` : ''} x ${qty}`);
    }

    // --- STREAMING_CHUNK: Multi-photo client-side image compression using canvas ---
    function previewPatternImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const statusText = document.getElementById('creator-image-status');
      statusText.innerText = '圖片縮放壓縮中...';

      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          const max_size = 800; // 手機照片等比例最大縮放至 800px

          if (width > height) {
            if (width > max_size) {
              height *= max_size / width;
              width = max_size;
            }
          } else {
            if (height > max_size) {
              width *= max_size / height;
              height = max_size;
            }
          }

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          // 核心：採用 0.7 壓縮率的 JPEG，能將原本數 MB 的手機照片完美降低至 50KB ~ 100KB！
          draftPatternImage = canvas.toDataURL('image/jpeg', 0.7);

          const previewWrapper = document.getElementById('creator-image-preview-wrapper');
          const previewImg = document.getElementById('creator-image-preview');

          previewWrapper.classList.remove('hidden');
          previewImg.src = draftPatternImage;
          statusText.innerText = '上傳成功！';
          lucide.createIcons();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
