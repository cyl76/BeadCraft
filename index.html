    // --- STREAMING_CHUNK: Saving custom templates and sorting elements... ---
    function saveNewPattern() {
      const nameInput = document.getElementById('new-pattern-name');
      const name = nameInput.value.trim();

      const select = document.getElementById('new-pattern-category-select');
      const customInput = document.getElementById('new-pattern-category-custom');
      
      let category = '未分類';
      if (select.value === '__custom__') {
        category = customInput.value.trim();
      } else {
        category = select.value;
      }
      if (!category) category = '未分類';

      if (!name) {
        showToast('請輸入圖紙名稱', 'alert');
        return;
      }

      if (draftPatternBeads.length === 0) {
        showToast('請至少新增一項所需的拼豆色號', 'alert');
        return;
      }

      if (editingPatternOldName && editingPatternOldName !== name) {
        delete patterns[editingPatternOldName];
      }

      patterns[name] = {
        requirements: [...draftPatternBeads],
        image: draftPatternImage,
        category: category
      };
      
      saveData();
      populatePatternSelector();
      updatePatternCategorySelect();
      
      document.getElementById('pattern-selector').value = name;
      resetPatternSelections();
      renderPatternRequirements();
      closePatternCreator();
      showToast(`成功儲存圖紙「${name}」在【${category}】分類中！`);
    }

    // --- STREAMING_CHUNK: Editing single inventory rows and updating schemas... ---
    function openBeadModal(code = null) {
      editingBeadCode = code;
      const modalTitle = document.getElementById('bead-modal-title');
      const codeInput = document.getElementById('edit-bead-code');
      const colorPicker = document.getElementById('edit-bead-color-picker');
      const colorHex = document.getElementById('edit-bead-color-hex');
      const nameInput = document.getElementById('edit-bead-name');
      const textColorSelect = document.getElementById('edit-bead-text-color');
      const delBtn = document.getElementById('btn-delete-bead');
      const select = document.getElementById('edit-bead-category-select');

      select.innerHTML = '';
      const uniqueCats = Array.from(new Set(beads.map(b => b.category || getBeadCategory(b.code))));
      uniqueCats.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

      uniqueCats.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.innerText = `分類: ${cat}`;
        select.appendChild(opt);
      });
      const optCustom = document.createElement('option');
      optCustom.value = '__custom__';
      optCustom.innerText = '＋自訂新分類';
      select.appendChild(optCustom);

      if (code) {
        const b = beads.find(x => x.code === code);
        modalTitle.innerHTML = `<i data-lucide="edit-3" class="w-5 h-5 text-[#cf9d67]"></i> 修改拼豆色號`;
        codeInput.value = b.code;
        colorPicker.value = b.color;
        colorHex.value = b.color;
        nameInput.value = b.name;
        textColorSelect.value = b.textColor || 'auto';
        
        if (uniqueCats.includes(b.category)) {
          select.value = b.category;
        } else {
          select.value = '__custom__';
          document.getElementById('edit-bead-category-custom').value = b.category;
        }
        delBtn.classList.remove('hidden');
      } else {
        modalTitle.innerHTML = `<i data-lucide="plus-circle" class="w-5 h-5 text-[#cf9d67]"></i> 新增拼豆色號`;
        codeInput.value = '';
        colorPicker.value = '#cf9d67';
        colorHex.value = '#cf9d67';
        nameInput.value = '';
        textColorSelect.value = 'auto';
        if (uniqueCats.length > 0) select.value = uniqueCats[0];
        delBtn.classList.add('hidden');
      }

      toggleEditCustomCategoryField();
      document.getElementById('bead-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeBeadModal() {
      document.getElementById('bead-modal').classList.add('hidden');
    }

    function syncEditColorText(val) {
      document.getElementById('edit-bead-color-hex').value = val.toUpperCase();
    }

    function syncEditColorPicker(val) {
      if (/^#[0-9A-F]{6}$/i.test(val)) {
        document.getElementById('edit-bead-color-picker').value = val;
      }
    }

    function toggleEditCustomCategoryField() {
      const select = document.getElementById('edit-bead-category-select');
      const customInput = document.getElementById('edit-bead-category-custom');
      if (select.value === '__custom__') {
        customInput.classList.remove('hidden');
        customInput.focus();
      } else {
        customInput.classList.add('hidden');
      }
    }

    function submitBead() {
      const codeInput = document.getElementById('edit-bead-code');
      const colorInput = document.getElementById('edit-bead-color-hex');
      const select = document.getElementById('edit-bead-category-select');
      const customInput = document.getElementById('edit-bead-category-custom');
      const nameInput = document.getElementById('edit-bead-name');
      const textColorSelect = document.getElementById('edit-bead-text-color');

      const code = codeInput.value.trim().toUpperCase();
      const color = colorInput.value.trim();
      const remark = nameInput.value.trim();
      const tColor = textColorSelect.value;

      if (!code) {
        showToast('請輸入拼豆色號！', 'alert');
        return;
      }

      const existing = beads.find(b => b.code === code);
      if (existing && editingBeadCode !== code) {
        showToast(`色號 ${code} 已經存在於庫存中！`, 'alert');
        return;
      }

      if (!/^#[0-9A-F]{6}$/i.test(color)) {
        showToast('請輸入正確的 16 進位顏色代碼（如 #FF0000）', 'alert');
        return;
      }

      let category = '';
      if (select.value === '__custom__') {
        category = customInput.value.trim().toUpperCase();
        if (!category) {
          showToast('請輸入自訂分類名稱！', 'alert');
          return;
        }
      } else {
        category = select.value;
      }

      const name = getDefaultName(code, remark);

      if (editingBeadCode) {
        const b = beads.find(x => x.code === editingBeadCode);
        
        if (editingBeadCode !== code) {
           Object.keys(patterns).forEach(pName => {
             const reqs = getPatternRequirements(pName);
             reqs.forEach(req => {
               if (req.code === editingBeadCode) req.code = code;
               if (req.altCodes) {
                 req.altCodes = req.altCodes.map(alt => alt === editingBeadCode ? code : alt);
               }
             });
           });
           if (selectedBeads.has(editingBeadCode)) {
             selectedBeads.delete(editingBeadCode);
             selectedBeads.add(code);
           }
        }

        b.code = code;
        b.color = color;
        b.name = name;
        b.category = category;
        if (tColor === 'auto') {
          delete b.textColor;
        } else {
          b.textColor = tColor;
        }
        showToast(`成功更新色號 ${code}！`);
      } else {
        const newBead = {
          code: code,
          name: name,
          stock: 0,
          pending: 0,
          color: color,
          category: category
        };
        if (tColor !== 'auto') newBead.textColor = tColor;
        beads.push(newBead);
        showToast(`成功新增色號 ${code}！`);
      }

      beads.sort((a, b) => {
        const isAZG = a.code.startsWith('ZG');
        const isBZG = b.code.startsWith('ZG');
        if (isAZG && !isBZG) return 1;
        if (!isAZG && isBZG) return -1;
        return a.code.localeCompare(b.code, undefined, { numeric: true, sensitivity: 'base' });
      });

      saveData();
      renderCategoryTabs();
      renderBeads();
      renderStats();
      setupDatalistOptions();
      resetPatternSelections();
      renderPatternRequirements();
      closeBeadModal();
    }

    function promptDeleteBead() {
      if (!editingBeadCode) return;
      showCustomConfirm(
        '刪除色號確認',
        `確定要永久刪除色號「${editingBeadCode}」嗎？這將會清除它的所有庫存資料。若現有圖紙中有綁定此色號，圖紙中的該項需求也將會被一併移除！`,
        () => {
          beads = beads.filter(b => b.code !== editingBeadCode);
          selectedBeads.delete(editingBeadCode);
          
          Object.keys(patterns).forEach(pName => {
             if (patterns[pName] && patterns[pName].requirements) {
               patterns[pName].requirements = patterns[pName].requirements.filter(req => req.code !== editingBeadCode);
               patterns[pName].requirements.forEach(req => {
                 if (req.altCodes) {
                   req.altCodes = req.altCodes.filter(alt => alt !== editingBeadCode);
                 }
               });
             }
          });

          saveData();
          renderCategoryTabs();
          renderBeads();
          renderStats();
          setupDatalistOptions();
          resetPatternSelections();
          renderPatternRequirements();
          closeBeadModal();
          showToast(`已成功移除色號 ${editingBeadCode}`);
        }
      );
    }

    // --- STREAMING_CHUNK: Exporting and importing JSON with full categories... ---
    function toggleExportDropdown(e) {
      e.stopPropagation();
      const dropdown = document.getElementById('export-dropdown');
      dropdown.classList.toggle('hidden');
    }

    document.addEventListener('click', function(event) {
      const dropdown = document.getElementById('export-dropdown');
      const container = document.getElementById('export-dropdown-container');
      if (dropdown && !dropdown.classList.contains('hidden') && !container.contains(event.target)) {
        dropdown.classList.add('hidden');
      }
    });

    function exportSystemData() {
      const backupObj = {
        app: "BeadCraft_MARD",
        backupVersion: "1.3",
        exportedAt: new Date().toISOString(),
        beads: beads,
        patterns: patterns
      };

      const dataStr = JSON.stringify(backupObj, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `拼豆備份_${new Date().toISOString().slice(0,10)}.json`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('🎉備份已成功導出！');
    }

    function importSystemData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      const isJson = file.name.endsWith('.json');

      reader.onload = function(e) {
        const content = e.target.result;

        if (isJson) {
          try {
            const parsed = JSON.parse(content);
            if (parsed.beads && parsed.patterns) {
              showCustomConfirm(
                '確認載入系統備份',
                '導入完整備份將覆蓋現有「所有色號庫存」以及「所有圖紙設計與其分類」，此動作無法復原。是否確定導入？',
                () => {
                  beads = parsed.beads;
                  patterns = parsed.patterns;

                  beads.forEach(b => {
                    if (!b.category) b.category = getBeadCategory(b.code);
                    if (!b.name) b.name = getDefaultName(b.code);
                  });

                  Object.keys(patterns).forEach(name => {
                    if (Array.isArray(patterns[name])) {
                      patterns[name] = {
                        requirements: patterns[name],
                        image: '',
                        category: '未分類'
                      };
                    } else if (!patterns[name].category) {
                      patterns[name].category = '未分類';
                    }
                  });

                  saveData();
                  renderCategoryTabs();
                  renderBeads();
                  renderStats();
                  renderPendingList();
                  populatePatternSelector();
                  updatePatternCategorySelect();
                  resetPatternSelections();
                  renderPatternRequirements();
                  setupDatalistOptions();
                  showToast('🎉 系統備份檔案已成功完整載入！');
                }
              );
            } else {
              showToast('導入失敗：此 JSON 檔案格式不符合 BeadCraft 備份要求。', 'alert');
            }
          } catch (err) {
            showToast('JSON 檔案解析失敗，請確認檔案未損毀。', 'alert');
          }
        } else {
          parseAndApplyCSV(content);
        }

        event.target.value = '';
      };

      if (isJson) {
        reader.readAsText(file, 'utf-8');
      } else {
        reader.readAsText(file);
      }
    }

    // --- STREAMING_CHUNK: Processing batch items and table templates... ---
    function openBatchModal(type) {
      currentBatchActionType = type;
      const title = document.getElementById('batch-modal-title');
      const desc = document.getElementById('batch-modal-desc');
      const label = document.getElementById('batch-input-label');
      const input = document.getElementById('batch-input-value');

      if (type === 'consume') {
        title.innerText = '批次扣除庫存';
        desc.innerText = `對選取的 ${selectedBeads.size} 個色號進行扣減。`;
        label.innerText = '消耗數量 (顆)';
        input.value = 500;
      } else {
        title.innerText = '批次新增補貨';
        desc.innerText = `對選取的 ${selectedBeads.size} 個色號加入補貨。`;
        label.innerText = '補貨數量 (顆)';
        input.value = 1000;
      }

      document.getElementById('batch-modal').classList.remove('hidden');
    }

    function closeBatchModal() {
      document.getElementById('batch-modal').classList.add('hidden');
    }

    function executeBatchAction() {
      const input = document.getElementById('batch-input-value');
      const val = parseInt(input.value);
      if (isNaN(val) || val <= 0) {
        showToast('請輸入正確的整數數量', 'alert');
        return;
      }

      let successCount = 0;
      let failCount = 0;

      selectedBeads.forEach(code => {
        const bead = beads.find(b => b.code === code);
        if (bead) {
          if (currentBatchActionType === 'consume') {
            if (bead.stock >= val) {
              bead.stock -= val;
              successCount++;
            } else {
              failCount++;
            }
          } else {
            bead.pending += val;
            successCount++;
          }
        }
      });

      saveData();
      renderBeads();
      renderStats();
      renderPendingList();
      renderPatternRequirements();
      closeBatchModal();
      
      if (currentBatchActionType === 'consume') {
        showToast(`批次消耗：${successCount} 個成功` + (failCount > 0 ? `，${failCount} 個因庫存不足而略過` : ''));
      } else {
        showToast(`已成功為 ${successCount} 個色號新增待確認補貨數量：+${val}`);
      }
      
      clearBatchSelection();
    }

    function parseAndApplyCSV(text) {
      try {
        const lines = text.split('\n');
        if (lines.length < 2) {
          showToast('CSV 格式錯誤，內容行數不足', 'alert');
          return;
        }

        const headers = lines[0].split(',');
        const mardIndex = headers.findIndex(h => h.trim().toUpperCase().includes('MARD'));
        const stockIndex = headers.findIndex(h => h.trim().includes('庫存'));
        const pendingIndex = headers.findIndex(h => h.trim().includes('補貨'));

        if (mardIndex === -1) {
          showToast('無法找到 MARD 色號欄位，請上傳正確格式之拼豆 CSV', 'alert');
          return;
        }

        let updatedCount = 0;

        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          
          const columns = line.split(',');
          const code = columns[mardIndex]?.trim();
          if (!code) continue;

          const cleanCode = code.replace(/白色|黑色|透明/g, '').trim();

          const stockVal = stockIndex !== -1 ? parseInt(columns[stockIndex]) : 0;
          const pendingVal = pendingIndex !== -1 ? parseInt(columns[pendingIndex]) : 0;

          const bead = beads.find(b => b.code === cleanCode || b.code === code);
          if (bead) {
            bead.stock = isNaN(stockVal) ? 0 : stockVal;
            bead.pending = isNaN(pendingVal) ? 0 : pendingVal;
            updatedCount++;
          }
        }

        saveData();
        renderCategoryTabs();
        renderBeads();
        renderStats();
        renderPendingList();
        renderPatternRequirements();
        showToast(`成功導入！已更新 ${updatedCount} 個 MARD 拼豆色號`);
      } catch (err) {
        console.error(err);
        showToast('解析 CSV 發生錯誤，請檢查檔案格式', 'alert');
      }
    }

    function exportToCSV() {
      let csvContent = "\ufeffMARD,庫存,補貨\r\n";
      
      beads.forEach(bead => {
        csvContent += `"${bead.code}",${bead.stock},${bead.pending > 0 ? bead.pending : ''}\r\n`;
      });

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `MARD_拼豆簡易表格_${new Date().toISOString().slice(0,10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('簡易庫存 CSV 表格已成功導出！');
    }

    function resetToDefault() {
      showCustomConfirm(
        '數據全部歸零確認',
        '確定要將所有拼豆色號的庫存與補貨數量「全部歸零」嗎？這會清除所有的庫存與修改紀錄，且無法復原。',
        () => {
          localStorage.removeItem('mard_beads_data');
          localStorage.removeItem('mard_patterns_data');
          
          beads = populateEmptyBeads(); 
          
          patterns = {};
          Object.keys(initialPatternsData).forEach(name => {
            patterns[name] = {
              requirements: initialPatternsData[name].requirements,
              image: '',
              category: initialPatternsData[name].category || '未分類'
            };
          });
          
          renderCategoryTabs();
          renderBeads();
          renderStats();
          renderPendingList();
          populatePatternSelector();
          updatePatternCategorySelect();
          resetPatternSelections();
          renderPatternRequirements();
          showToast('所有拼豆數量已成功歸零，您可以開始登記新庫存。');
        }
      );
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      const text = document.getElementById('toast-message');

      text.innerText = message;
      
      if (type === 'alert') {
        icon.className = "w-4 h-4 text-rose-500 animate-bounce";
        icon.setAttribute('data-lucide', 'alert-circle');
      } else {
        icon.className = "w-4 h-4 text-amber-200";
        icon.setAttribute('data-lucide', 'check-circle');
      }

      lucide.createIcons();

      toast.className = "fixed bottom-6 right-6 z-[200] transform translate-y-0 opacity-100 transition-all duration-300 bg-[#5c4e37] text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3";
      
      setTimeout(() => {
        toast.className = "fixed bottom-6 right-6 z-[200] transform translate-y-12 opacity-0 pointer-events-none transition-all duration-300 bg-[#5c4e37] text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-3";
      }, 3000);
    }
  </script>
